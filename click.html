<!DOCTYPE html>
<html>
<head>
    <title>Purdue Meigs A - Multi-Point Selector</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Make the map take up the whole screen */
        body, html { margin: 0; padding: 0; height: 100%; }
        #map { height: 100vh; width: 100vw; }
        
        /* Style the floating dashboard */
        #dashboard {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            font-family: Arial, sans-serif;
            width: 280px;
            
            /* Added so the box doesn't run off the screen if you click many points */
            max-height: 70vh; 
            overflow-y: auto; 
        }
        .instruction {
            font-size: 0.9em;
            color: #555;
            font-style: italic;
            margin-bottom: 10px;
        }
        
        /* Style the list of recorded points */
        .point-entry {
            background: #f9f9f9;
            border-left: 4px solid #4CAF50;
            padding: 8px;
            margin-bottom: 5px;
            font-size: 0.9em;
            border-radius: 0 4px 4px 0;
        }
        
        /* Make the numbers on the map look nice */
        .leaflet-tooltip.number-label {
            background: #4CAF50;
            color: white;
            border: none;
            font-weight: bold;
            font-size: 14px;
            border-radius: 50%;
            padding: 4px 8px;
        }
    </style>
</head>
<body>

    <div id="dashboard">
        <h3>Meigs A Survey Tool</h3>
        <p class="instruction">Click inside the green boundary to log multiple checkpoints.</p>
        
        <p><strong>Hover Location:</strong><br><span id="mouse-coords">Hover over map...</span></p>
        
        <hr>
        
        <p><strong>Recorded Checkpoints:</strong></p>
        <div id="point-list">
            <span id="empty-message" style="color:gray; font-size:0.9em;">No locations clicked yet.</span>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Initialize the map
        var map = L.map('map').setView([40.2919, -86.8762], 18);

        // Add satellite imagery
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        }).addTo(map);

        // Define the farm boundary 
        var farmCoords = [
            [-86.876892, 40.292186],
            [-86.875458, 40.292186],
            [-86.875458, 40.291644],
            [-86.876892, 40.291644],
            [-86.876892, 40.292186]
        ];

        // Draw the boundary on the map
        var leafletCoords = farmCoords.map(coord => [coord[1], coord[0]]);
        var farmLayer = L.polygon(leafletCoords, {
            color: 'lime',
            fillOpacity: 0.2,
            weight: 3
        }).addTo(map);

        map.fitBounds(farmLayer.getBounds());

        // Track the mouse movement for the hover effect
        map.on('mousemove', function(e) {
            var lat = e.latlng.lat.toFixed(6);
            var lng = e.latlng.lng.toFixed(6);
            document.getElementById('mouse-coords').innerText = lat + ", " + lng;
        });

        // ---------------------------------------------------------
        // NEW LOGIC: Keep track of multiple points
        // ---------------------------------------------------------
        
        var pointCounter = 0; // Starts at zero

        farmLayer.on('click', function(e) {
            pointCounter++; // Increase count by 1 every time you click
            
            var clickedLat = e.latlng.lat;
            var clickedLng = e.latlng.lng;

            // 1. Drop a new marker on the map
            var newMarker = L.marker([clickedLat, clickedLng]).addTo(map);
            
            // 2. Attach a permanent numbered label to the marker
            newMarker.bindTooltip(pointCounter.toString(), {
                permanent: true, 
                direction: 'right',
                className: 'number-label',
                offset: [10, 0] // Pushes the number slightly to the right of the pin
            }).openTooltip();

            // 3. Hide the "No locations clicked yet" message if it's the first click
            if (pointCounter === 1) {
                document.getElementById('empty-message').style.display = 'none';
            }

            // 4. Create a new text entry for the dashboard
            var listContainer = document.getElementById('point-list');
            var newEntry = document.createElement('div');
            newEntry.className = 'point-entry';
            
            // Format the text inside the new entry
            newEntry.innerHTML = `<strong>Point ${pointCounter}</strong><br>
                                  Lat: ${clickedLat.toFixed(6)}<br>
                                  Lon: ${clickedLng.toFixed(6)}`;
            
            // 5. Add the new entry to the bottom of the list
            listContainer.appendChild(newEntry);
            
            // 6. Auto-scroll the dashboard list to the bottom so the newest point is always visible
            var dashboard = document.getElementById('dashboard');
            dashboard.scrollTop = dashboard.scrollHeight;
        });
    </script>
</body>
</html>
